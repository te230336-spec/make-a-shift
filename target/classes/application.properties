# データベースの接続情報 (MySQL用)
spring.datasource.url=jdbc:mysql://localhost:3306/shift_db?serverTimezone=Asia/Tokyo&useSSL=false&allowPublicKeyRetrieval=true
spr6ing.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Hibernate (JPA) の設定
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update


# Timefold Solver（シフト自動作成）の計算時間の上限
# 短すぎると精度が落ち、長すぎるとHTTPタイムアウトの原因になる
timefold.solver.termination.spent-limit=10s
