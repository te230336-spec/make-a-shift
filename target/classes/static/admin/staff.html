<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフ管理</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="container">

        <a href="index-admin.html">← ホームへ戻る</a>

        <h1>スタッフ管理</h1>

        <div class="form-section">
            <h2>新規スタッフ登録</h2>

            <form id="staffForm">

                <div class="input-group">
                    <label>名前:</label>
                    <input type="text" id="name" required>
                </div>

                <div class="input-group">
                    <label>メールアドレス:</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>パスワード:</label>
                    <input type="password" id="password" required>
                </div>

                <div class="input-group">
                    <label>タブレットPIN（4桁）:</label>
                    <input type="text" id="pinCode" pattern="\d{4}" required>
                </div>

                <div class="input-group">
                    <label>役職:</label>
                    <select id="role">
                        <option value="STAFF">アルバイト</option>
                        <option value="VETERAN">ベテラン</option>
                        <option value="STORE_MANAGER">店長（ワンオペ可）</option>
                    </select>
                </div>

                <button type="submit">登録する</button>

            </form>
        </div>

        <div class="list-section">

            <h2>登録済みスタッフ一覧</h2>

            <table id="staffTable">

                <thead>
                    <tr>
                        <th>名前</th>
                        <th>役職</th>
                        <th>ベテラン</th>
                        <th>週労働時間</th>
                        <th>残業時間</th>
                    </tr>
                </thead>

                <tbody id="staffTableBody">
                </tbody>

            </table>

        </div>

    </div>

    <script src="staff.js"></script>

</body>
</html>
