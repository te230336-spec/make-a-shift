<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お店の管理アプリ - 店長画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        
        <header>
            <div class="header-left">
                <div class="datetime-box">
                    <span id="datetime-display">7月6日(月) 10:30</span>
                    <span class="weather-tag">☀️ 晴れ 26℃</span>
                </div>
            </div>
            
            <div class="easy-settings">
                <div class="setting-item">
                    <label>👵 文字の大きさ：<span id="font-size-label">標準</span></label>
                    <input type="range" id="font-slider" min="1" max="5" value="3">
                </div>
                <div class="setting-item">
                    <label>☀️ 画面の明るさ</label>
                    <input type="range" id="bright-slider" min="70" max="130" value="100">
                </div>
            </div>
        </header>

        <main class="grid-layout">
            
            <section class="card shift-section">
                <h2 class="section-title title-blue">📅 シフトの管理</h2>
                <div class="action-buttons">
                    <button id="btn-auto-shift" class="btn btn-blue">✨ シフトを自動作成する</button>
                </div>

                <div class="shift-board-container">
                    <div class="date-navigation">
                        <button class="nav-arrow">◀</button>
                        <div class="current-date-box">7月6日（月）</div>
                        <button class="nav-arrow">▶</button>
                    </div>

                    <div class="timeline-wrapper">
                        <div class="time-axis">
                            <div class="time-slot">9</div>
                            <div class="time-slot">10</div>
                            <div class="time-slot">11</div>
                            <div class="time-slot">12</div>
                            <div class="time-slot">13</div>
                            <div class="time-slot">14</div>
                            <div class="time-slot">15</div>
                            <div class="time-slot">16</div>
                            <div class="time-slot">17</div>
                            <div class="time-slot">18</div>
                            <div class="time-slot">19</div>
                            <div class="time-slot">20</div>
                        </div>

                        <div id="shift-bars-container" class="shift-bars-area">
                            </div>
                    </div>
                </div>
            </section>

            <div class="right-column">
                
                <section class="card task-section">
                    <h2 class="section-title title-purple">📝 今日のタスク</h2>
                    
                    <div class="task-input-form">
                        <input type="text" id="new-task-input" placeholder="新しくやること（例：お掃除）">
                        <button id="btn-add-task" class="btn-add">追加</button>
                    </div>

                    <ul id="task-list" class="task-list">
                        </ul>
                </section>

                <section class="card info-section">
                    <h2 class="section-title title-pink">📢 お店のお知らせ</h2>
                    <div class="info-box">
                        <p class="info-date">今日</p>
                        <p class="info-text">14:00に新しい商品の納品があります。冷凍庫の準備をお願いします。</p>
                    </div>
                </section>
                
            </div>
        </main>

        <footer>
            <a href="staff.html" class="page-link">➔ スタッフ用の希望提出画面をみる</a>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
