<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バイトさんアプリ - 希望提出画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        
        <header style="background-color: #F6C9DA; border-color: #EBB6C7;">
            <div class="header-left">
                <div class="datetime-box" style="font-size: 20px;">
                    <span>🌸 バイトさん用の画面</span>
                </div>
            </div>
            
            <div class="easy-settings">
                <div class="setting-item">
                    <label>👵 文字の大きさ：<span id="font-size-label">標準</span></label>
                    <input type="range" id="font-slider" min="1" max="5" value="3">
                </div>
                <div class="setting-item">
                    <label>☀️ 画面の明るさ</label>
                    <input type="range" id="bright-slider" min="70" max="130" value="100">
                </div>
            </div>
        </header>

        <main class="grid-layout" style="grid-template-columns: 1fr;">
            
            <section class="card">
                <h2 class="section-title title-pink" style="margin-bottom: 20px;">📝 希望シフトを出す</h2>
                
                <form id="shift-submit-form">
                    <div class="form-group">
                        <label>👤 あなたのお名前は？</label>
                        <select id="staff-name" style="padding: 15px; font-size: 20px; font-family: inherit; border-radius: 10px; border: 2px solid #CCC; font-weight: 800; background: var(--white);" required>
                            <option value="" disabled selected>タップして名前を選んでね</option>
                            <option value="田中">田中さん</option>
                            <option value="佐藤">佐藤さん</option>
                            <option value="鈴木">鈴木さん</option>
                            <option value="高橋">高橋さん</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>📅 何月何日に出勤しますか？</label>
                        <input type="date" id="shift-date" value="2026-07-06" style="padding: 15px; font-size: 20px; font-family: inherit; border-radius: 10px; border: 2px solid #CCC; font-weight: 800;" required>
                    </div>

                    <div class="form-group row" style="display: flex; gap: 15px; margin-bottom: 25px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                            <label>⏰ 何時から？</label>
                            <input type="number" id="start-time" min="9" max="20" value="9" style="padding: 15px; font-size: 20px; font-family: inherit; border-radius: 10px; border: 2px solid #CCC; font-weight: 800;" required>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                            <label>⏰ 何時まで？</label>
                            <input type="number" id="end-time" min="9" max="20" value="13" style="padding: 15px; font-size: 20px; font-family: inherit; border-radius: 10px; border: 2px solid #CCC; font-weight: 800;" required>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="background-color: var(--pink-dark); color: var(--white); box-shadow: 0 4px 0px #6B233F; max-width: 100%;">
                        🚀 店長に入力したシフトを送る
                    </button>
                </form>
            </section>
            
        </main>

        <footer>
            <a href="index.html" class="page-link" style="color: var(--pink-dark); font-size: 20px;">➔ 店長用の管理画面（シフト自動作成）に戻る</a>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
