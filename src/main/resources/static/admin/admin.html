<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク管理システム - 管理者画面</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
</head>
<body>

    <div id="app">
        
        <div id="pin-screen" class="pin-screen-container">
            <div class="card pin-card">
                <h2 class="pin-title">🔒 PINコードを入力（管理者用）</h2>
                <p class="pin-subtitle">キーボードで4桁の数字を入力してください</p>
                
                <input type="password" id="hidden-pin-input" maxlength="4" inputmode="numeric" oninput="handlePinInput(event)">

                <div class="pin-display">
                    <div class="pin-box-slot active-focus" id="slot-0"></div>
                    <div class="pin-box-slot" id="slot-1"></div>
                    <div class="pin-box-slot" id="slot-2"></div>
                    <div class="pin-box-slot" id="slot-3"></div>
                </div>
                <p style="font-size:12px; color:var(--ink-soft); font-weight:800; margin-top: 25px;">（管理者テストPIN：1234）</p>
            </div>
        </div>

        <div id="main-screen" style="display: none;">
            <header>
                <div class="header-left"><div class="datetime-box">📝 タスク管理センター【管理者】</div></div>
                <div class="easy-settings">
                    <div class="current-user-trigger" onclick="logOut()">
                        <div id="current-user-avatar" class="user-avatar-circle">田</div>
                        <span id="current-user-name" class="user-name-txt">田中さん</span>
                    </div>
                </div>
            </header>

            <div class="grid-layout">
                <section class="card">
                    <h2 class="section-title">✍️ 新しいタスクを作る</h2>
                    <form onsubmit="createNewTask(event)">
                        <div class="form-row-group">
                            <label class="form-label-txt">タスクの大まかな内容（タイトル）</label>
                            <input type="text" id="task-title" class="standard-input" placeholder="例：レジの精算と現金確認" required>
                        </div>
                        <div class="form-row-group" style="margin-top:15px;">
                            <label class="form-label-txt">詳細な内容（メモ・手順）</label>
                            <textarea id="task-detail" class="standard-input" rows="4" placeholder="例：点検レシートを出して、金庫の額面と一致しているか数える。" required></textarea>
                        </div>
                        <button type="submit" class="btn-blue" style="margin-top:20px;">✨ タスクを登録する</button>
                    </form>
                </section>

                <div style="display:flex; flex-direction:column; gap:20px;">
                    <section class="card">
                        <h2 class="section-title" style="color: var(--shift-blue-dark);">⏳ やること一覧（未達成）</h2>
                        <div id="todo-list"></div>
                    </section>
                    <section class="card">
                        <h2 class="section-title" style="color: var(--pink-dark);">✅ 終了したタスク</h2>
                        <div id="done-list"></div>
                    </section>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
